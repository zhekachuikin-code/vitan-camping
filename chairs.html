<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стільці та крісла Vitan — Camping-UA</title>
  <style type="text/css">
    :root { --blue: #2c3e50; --orange: #ff6700; --bg: #f4f7f9; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); font-size: 16px; color: #34495e; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    header { background: #fff; padding: 15px 0; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .brand-logo img { height: 40px; width: auto; display: block; }
    .nav-back { font-size: 13px; font-weight: 800; color: var(--blue); text-decoration: none; border: 1.5px solid var(--blue); padding: 5px 12px; border-radius: 6px; }

    .page-title { margin: 40px 0; text-align: center; font-size: 32px; color: var(--blue); text-transform: uppercase; font-weight: 900; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #dcdde1; display: flex; flex-direction: column; transition: 0.3s; text-decoration: none; color: inherit; }
    .card:hover { transform: translateY(-5px); border-color: var(--orange); }
    
    .card-img { padding: 20px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #fff; }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .card-info { padding: 20px; text-align: center; border-top: 1px solid #f1f1f1; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .card-info h2 { font-size: 17px; color: var(--blue); margin: 0 0 10px; height: 45px; overflow: hidden; line-height: 1.3; font-weight: 700; }
    .card-price { font-size: 22px; font-weight: 900; color: var(--orange); margin-bottom: 15px; }
    
    .btn-view { background: var(--blue); color: #fff; padding: 12px; border-radius: 8px; display: block; font-weight: 800; text-transform: uppercase; font-size: 13px; }
    .card:hover .btn-view { background: var(--orange); }
  </style>
</head>
<body>

<header>
  <div class="container header-content">
    <div class="brand-logo"><img src="https://vitan.in.ua/image/catalog/vitan-logo.svg" alt="Vitan"></div>
    <a href="index.html" class="nav-back">← НА ГОЛОВНУ</a>
  </div>
</header>

<div class="container">
  <h1 class="page-title">Стільці та крісла</h1>
  
  <div class="product-grid">
    
    <a href="vitan-director.html" class="card">
      <div class="card-img"><img src="https://i.postimg.cc/0QT2hgQJ/Alum-Stilec'-Reziser-30-15-mm-(Sirij)e.jpg"></div>
      <div class="card-info">
        <h2>Стілець Режисер Алюміній 30х15 мм (Сірий)</h2>
        <div class="card-price">3 513 грн</div>
        <div class="btn-view">Докладніше</div>
      </div>
    </a>

    <a href="vitan-director-no-shelf.html" class="card">
      <div class="card-img"><img src="https://i.postimg.cc/nzwK9GkD/Stilec'-Reziser-bez-polici-d20-mm-(Tekstilen-Bezeva-smuga).jpg"></div>
      <div class="card-info">
        <h2>Стілець Режисер без полиці d20 мм (Текстилен)</h2>
        <div class="card-price">1 672 грн</div>
        <div class="btn-view">Докладніше</div>
      </div>
    </a>

    <a href="vitan-director-with-shelf.html" class="card">
      <div class="card-img"><img src="https://i.postimg.cc/rs8VkPz8/Stilec'-Reziser-z-policeu-d25-mm-(Oksford-Dubok).jpg"></div>
      <div class="card-info">
        <h2>Стілець Режисер з полицею d25 мм (Дубок)</h2>
        <div class="card-price">2 499 грн</div>
        <div class="btn-view">Докладніше</div>
      </div>
    </a>

    <a href="vitan-ribak-ekonom.html" class="card">
      <div class="card-img"><img src="https://i.postimg.cc/prKbSYPj/Stilec'-Ribak-Ekonom-zi-spinkou-d16-mm-(Oksford-Kamuflaz).jpg"></div>
      <div class="card-info">
        <h2>Стілець Рибак Економ зі спинкою d16 мм</h2>
        <div class="card-price">484 грн</div>
        <div class="btn-view">Докладніше</div>
      </div>
    </a>

  </div>
</div>

</body>
</html>
