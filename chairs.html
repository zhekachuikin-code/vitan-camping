<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стільці та крісла Vitan — Camping-UA</title>
  <style type="text/css">
    :root { --blue: #2c3e50; --orange: #ff6700; --bg: #f4f7f9; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); font-size: 18px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    header { background: #fff; padding: 20px 0; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; font-weight: 900; color: var(--blue); text-transform: uppercase; text-decoration: none; }
    .logo span { color: var(--orange); }
    .back-link { text-decoration: none; color: var(--blue); font-weight: 800; font-size: 14px; border: 1px solid var(--blue); padding: 8px 15px; border-radius: 5px; }

    .page-title { margin: 50px 0; text-align: center; font-size: 36px; color: var(--blue); text-transform: uppercase; font-weight: 900; }

    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-bottom: 80px; }
    .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #dcdde1; display: flex; flex-direction: column; transition: 0.3s; }
    .card:hover { transform: translateY(-8px); border-color: var(--orange); }
    
    .card-img { padding: 25px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #fff; }
    .card-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .card-info { padding: 25px; flex-grow: 1; text-align: center; border-top: 1px solid #f1f1f1; }
    .card-info h2 { font-size: 20px; color: var(--blue); margin: 0 0 15px; height: 60px; overflow: hidden; line-height: 1.4; }
    .card-price { font-size: 28px; font-weight: 900; color: var(--orange); margin-bottom: 25px; }
    
    .btn-view { background: var(--blue); color: #fff; text-decoration: none; padding: 16px; border-radius: 10px; display: block; font-weight: 800; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
    .btn-view:hover { background: var(--orange); }

    @media (max-width: 480px) {
      .page-title { font-size: 28px; }
      .card-info h2 { font-size: 18px; }
      .card-price { font-size: 24px; }
    }
  </style>
</head>
<body>

<header class="container">
  <a href="index.html" class="logo">Camping-UA <span>Expert</span></a>
  <a href="index.html" class="back-link">← НА ГОЛОВНУ</a>
</header>

<div class="container">
  <h1 class="page-title">Стільці та крісла</h1>
  
  <div class="product-grid">
    <div class="card">
      <div class="card-img"><img src="https://i.postimg.cc/0QT2hgQJ/Alum-Stilec'-Reziser-30-15-mm-(Sirij)e.jpg"></div>
      <div class="card-info">
        <h2>Стілець Режисер Алюміній 30х15 мм (Сірий)</h2>
        <div class="card-price">3 513 грн</div>
        <a href="vitan-director.html" class="btn-view">Дивитися огляд</a>
      </div>
    </div>

    <div class="card">
      <div class="card-img"><img src="https://i.postimg.cc/nzwK9GkD/Stilec'-Reziser-bez-polici-d20-mm-(Tekstilen-Bezeva-smuga).jpg"></div>
      <div class="card-info">
        <h2>Стілець Режисер без полиці d20 мм (Текстилен)</h2>
        <div class="card-price">1 672 грн</div>
        <a href="vitan-director-no-shelf.html" class="btn-view">Дивитися огляд</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
